// config - siruuux (CS2 - 03/2026)


// Mouse
sensitivity "1.2"


// FPS Settings
fps_max "400"
fps_max_ui "145"


// Viewmodel
viewmodel_fov "68"
viewmodel_offset_x "2.5"
viewmodel_offset_y "0"
viewmodel_offset_z "-1.5"


// Crosshair
cl_crosshaircolor "5"
cl_crosshairalpha "255"
cl_crosshairdot "0"
cl_crosshairgap "-7"
cl_crosshairsize "2"
cl_crosshairstyle "4"
cl_crosshairthickness "0"
cl_crosshairusealpha "1"
cl_crosshair_drawoutline "0"
cl_crosshair_color_r "0"
cl_crosshaircolor_g "255"
cl_crosshaircolor_b "135"


// HUD
hud_scaling "0.75"
cl_hud_color "10"


// Radar
cl_radar_always_centered "false"
cl_radar_scale "1.3"
cl_radar_rotate "true"
cl_radar_icon_scale_min "0.55"


// Binds
bind "mwheelup" "+jump"
bind "space" "+jump"
bind "c" "cl_radar_icon_scale_min .1; cl_radar_scale .5"
bind "z" "cl_radar_icon_scale_min .75; cl_radar_scale 1" 

bind "F4" "say  ✂Ɑ͞ ﻝﮞ"
bind "F3" "say                                                                                            "

bind "F5" "volume .01"
bind "F6" "volume .05
bind "F7" "volume .2"
bind "F8" "volume .25"



echo "Successfully loaded siruuux's config"


